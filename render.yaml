# Render Blueprint.

services:
  - type: cron
    name: digest-daily
    runtime: python
    # 12:30 UTC, weekdays — after ingest-daily finishes.
    schedule: "30 12 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py send_daily_digests"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "cron"
      - key: DATABASE_URL
        fromDatabase:
          name: md-opinion-db
          property: connectionString
      - key: EMAIL_BACKEND_CHOICE
        sync: false
      - key: SITE_URL
        sync: false

  - type: cron
    name: digest-weekly
    runtime: python
    # Mondays 12:00 UTC.
    schedule: "0 12 * * 1"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py send_weekly_digests"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "cron"
      - key: DATABASE_URL
        fromDatabase:
          name: md-opinion-db
          property: connectionString
      - key: EMAIL_BACKEND_CHOICE
        sync: false
      - key: SITE_URL
        sync: false

  - type: cron
    name: ingest-daily
    runtime: python
    # 11:00 UTC = 07:00 ET during EDT (08:00 during EST — acceptable
    # drift), weekdays.
    schedule: "0 11 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py ingest_opinions"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "cron"
      - key: DATABASE_URL
        fromDatabase:
          name: md-opinion-db
          property: connectionString


  - type: web
    name: md-opinion-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      # The onrender.com hostname is added automatically via
      # RENDER_EXTERNAL_HOSTNAME; set any custom domain in the Render
      # dashboard (kept out of source).
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: md-opinion-db
          property: connectionString
      - key: OIDC_RP_CLIENT_ID
        sync: false
      - key: OIDC_RP_CLIENT_SECRET
        sync: false
      - key: ENTRA_TENANT_ID
        sync: false
      - key: ADMIN_APP_ROLE
        value: Admin

databases:
  - name: md-opinion-db
    plan: basic-256mb
    postgresMajorVersion: "16"
