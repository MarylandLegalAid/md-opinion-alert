name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mdoa
          POSTGRES_PASSWORD: mdoa
          POSTGRES_DB: mdoa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mdoa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://mdoa:mdoa@localhost:5432/mdoa
      DJANGO_SECRET_KEY: ci-only-secret
      DEBUG: "false"
      ALLOWED_HOSTS: testserver

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Check migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test
