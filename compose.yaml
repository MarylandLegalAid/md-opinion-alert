# Local development database only — production uses Render Managed PostgreSQL.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mdoa
      POSTGRES_PASSWORD: mdoa
      POSTGRES_DB: mdoa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
